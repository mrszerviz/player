<h3>NOW PLAYING</h3>
<div id="now"></div>

<h3>QUEUE</h3>
<div id="q"></div>

<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
<script>
const socket = io("https://YOUR-RENDER.onrender.com");

socket.on("update", (d) => {

  document.getElementById("now").innerText =
    d.current?.url || "nothing";

  document.getElementById("q").innerHTML =
    d.queue.slice(0,5).map(x => `<div>${x.url}</div>`).join("");
});
</script>
